---
apiVersion: v1
kind: Pod
metadata:
  name: pod-nginx-efs-dynamic2
  labels:
    app: nginx
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: efs-dynamic
      mountPath: /usr/share/nginx/html
  volumes:
  - name: efs-dynamic
    persistentVolumeClaim:
      claimName: efs-dynamic


---
kind: Service
apiVersion: v1
metadata:
  name: nginx-lb
spec:
  type: LoadBalancer
  selector: # labels are used as selectors
    app: nginx
  ports:
  - protocol: TCP
    port: 80 # service port
    targetPort: 80