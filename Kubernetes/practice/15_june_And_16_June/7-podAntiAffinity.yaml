#7-podAntiAffinity.yaml
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: web-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web
      env: prod

  template:
    metadata:
      labels:
        app: web
        env: prod

    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: env
                operator: In
                values:
                - prod
            topologyKey: kubernetes.io/hostname

      containers:
      - name: nginx-container
        image: nginx
        ports:
        - containerPort: 80