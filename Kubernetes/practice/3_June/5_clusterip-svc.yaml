#5_clusterip_svc.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: fb-service
  labels:
    app: fb-service
    env: prod 
spec:
  type: ClusterIP #we use clusterip when we want to access the service only within the cluster.
  selector:
    app: fb-app
    env: prod   
  ports:
  - protocol: TCP 
    port: 80 # This is the port to access the service, which is a internal port.
    targetPort: 8080  # This is the port on which the application is running inside the container.