---
apiVersion: v1
kind: Pod
metadata:
  name: fb-pod-withoutpv-2
  labels:
    app: facebook

spec:
  containers:
    - name: fb-container
      image: dockerhub1105/practicerepo:http_image_v1
      ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: fb-service

spec:
  type: LoadBalancer
  selector:
    app: facebook

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80